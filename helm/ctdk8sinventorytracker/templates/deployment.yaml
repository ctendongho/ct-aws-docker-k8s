apiVersion: apps/v1
kind: Deployment

metadata:
  name: ctdk8sinventorytracker
  namespace: ct-aws-dk8s

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ctdk8sinventorytracker

  template:
    metadata:
      labels:
        app: ctdk8sinventorytracker

    spec:
      containers:
      - name: ctdk8sinventorytracker
        image: ctendongho/ctdk8sinventorytracker:v2

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: DB_HOST

        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_PASSWORD

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: DB_NAME
