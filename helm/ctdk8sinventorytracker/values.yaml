replicaCount: 2

namespace: ct-aws-dk8s

image:
  repository: ctendongho/ctdk8sinventorytracker
  tag: v4
  pullPolicy: IfNotPresent

serviceAccount:
  name: inventory-app-sa

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

env:
  secretName: ct-aws-dk8s/mysql
  awsRegion: us-east-2

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

affinity:
  workload: inventory

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  minAvailable: 1

ingress:
  enabled: true
  host: inventory.ctappstracker.com
  certificateArn: arn:aws:acm:us-east-2:326095712541:certificate/4a5b1267-6b24-4a3f-b345-934bf10bc7be
