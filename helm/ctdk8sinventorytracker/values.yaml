replicaCount: 2

namespace: ct-aws-dk8s

image:
  repository: ctendongho/ctdk8sinventorytracker
  tag: v3
  pullPolicy: IfNotPresent

serviceAccount:
  name: inventory-app-sa

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

env:
  secretName: ct-aws-dk8s/mysql
  awsRegion: us-east-2

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

affinity:
  workload: inventory

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  minAvailable: 1
