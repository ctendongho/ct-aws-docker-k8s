apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ctdk8sinventorytracker-hpa
  namespace: ct-aws-dk8s

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ctdk8sinventorytracker

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
