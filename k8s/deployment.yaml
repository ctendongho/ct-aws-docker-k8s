apiVersion: apps/v1
kind: Deployment

metadata:
  name: ctdk8sinventorytracker
  namespace: ct-aws-dk8s

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ctdk8sinventorytracker

  template:
    metadata:
      labels:
        app: ctdk8sinventorytracker

    spec:
      serviceAccountName: inventory-app-sa

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: workload
                operator: In
                values:
                - inventory

      containers:
      - name: ctdk8sinventorytracker
        image: ctendongho/ctdk8sinventorytracker:v3

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

        env:
        - name: SECRET_NAME
          value: "ct-aws-dk8s/mysql"

        - name: AWS_REGION
          value: "us-east-2" 


        

